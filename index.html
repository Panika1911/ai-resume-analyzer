<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🤖 AI Resume Analyzer (Pro)</h1>
  <p>Powered by AI feedback system</p>

  <textarea id="resume" placeholder=" Upload your resume here..."></textarea>

  <button onclick="analyzeResume()">Analyze with AI</button>

  <div class="output">
    <h3>📊 AI Results</h3>
    <p id="loading" style="display:none;">Analyzing...</p>
    <p id="result"></p>
  </div>

</div>

<script>
async function analyzeResume() {
  let text = document.getElementById("resume").value;

  document.getElementById("loading").style.display = "block";
  document.getElementById("result").innerText = "";

  const prompt = `
You are an expert HR recruiter.

Analyze this resume and give:
1. ATS Score out of 100
2. Key Skills
3. Missing Skills
4. Improvement Suggestions

Resume:
${text}
`;

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer panika.19xxxxx"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.7
    })
  });

  const data = await response.json();

  document.getElementById("loading").style.display = "none";

  document.getElementById("result").innerText =
    data.choices[0].message.content;
}
</script>

</body>
</html>
