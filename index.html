<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🤖 AI Resume Analyzer (Pro)</h1>
  <p>Powered by AI feedback system</p>

  <textarea id="resume" placeholder=" Upload your resume here..."></textarea>

  <button onclick="analyzeResume()">Analyze with AI</button>

  <div class="output">
    <h3>📊 AI Results</h3>
    <p id="loading" style="display:none;">Analyzing...</p>
    <p id="result"></p>
  </div>

</div>

<script>
async function analyzeResume() {
  let text = document.getElementById("resume").value;

  document.getElementById("loading").style.display = "block";
  document.getElementById("result").innerText = "";

  try {
    const response = await fetch("http://localhost:5000/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ resume: text })
    });

    const data = await response.json();

    document.getElementById("result").innerText = data.result;

  } catch (error) {
    document.getElementById("result").innerText =
      "Error: Backend not running. Please start server.";
  }

  document.getElementById("loading").style.display = "none";
}
</script>

</body>
</html>
